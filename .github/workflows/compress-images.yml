name: Optimize images to ~200KB

on:
  push:
    branches: [ main ]
    paths:
      - '**/*.png'
      - '**/*.jpg'
      - '**/*.jpeg'

jobs:
  optimize:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install squoosh CLI
        run: npm i -g @squoosh/cli

      - name: Convert & compress images toward <=200KB
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t FILES < <(git ls-files | grep -Ei '\.(jpg|jpeg|png)$' || true)

          echo "Found ${#FILES[@]} image(s)."
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "No images to optimize."
            exit 0
          fi

          TARGET=200000
          MAXW=1920

          for f in "${FILES[@]}"; do
            echo "Processing: $f"

            out="${f%.*}.webp"
            cand="/tmp/${out##*/}"

            # 尝试生成 webp（不让它把整个 job 弄挂）
            npx @squoosh/cli --webp auto --resize "max_width=${MAXW}" -d /tmp "$f" >/dev/null 2>&1 || true

            if [ -f "$cand" ]; then
              size=$(wc -c < "$cand")
            else
              echo "  WARN: squoosh did not produce $cand (skipping this file)"
              continue
            fi

            if [ "$size" -gt "$TARGET" ]; then
              for q in 85 80 75 70 65 60; do
                npx @squoosh/cli --webp "quality=${q}" --resize "max_width=${MAXW}" -d /tmp "$f" >/dev/null 2>&1 || true

                if [ -f "$cand" ]; then
                  size=$(wc -c < "$cand")
                  echo "  Try quality=$q -> ${size} bytes"
                else
                  echo "  WARN: squoosh did not produce $cand at quality=$q"
                  size=999999999
                fi

                [ "$size" -le "$TARGET" ] && break
              done
            fi

            if [ -f "$cand" ]; then
              mv "$cand" "$out"
              git rm -f --quiet "$f" || true
              git add "$out"
              echo "  -> Saved as $out"
            else
              echo "  WARN: no output produced for $f, leaving original."
            fi
          done

      - name: Check if repo changed
        id: changes
        shell: bash
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit optimized images
        if: steps.changes.outputs.changed == 'true'
        uses: EndBug/add-and-commit@v9
        with:
          message: "chore: optimize images to ~200KB (webp)"
          add: "."
